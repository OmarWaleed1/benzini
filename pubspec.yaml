name: benzini
description: تطبيق بنزيني - تقارير محطات الوقود المجتمعية
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^11.0.0

  # UI & UX
  timeago: ^3.6.0
  uuid: ^4.3.3
  intl: ^0.19.0
  share_plus: ^9.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
